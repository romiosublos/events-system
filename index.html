<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Events</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div class="header">
<h1>AL GHadeer Nursery</h1>
<h2>Events</h2>
</div>

<div id="list"></div>

</div>

<script src="app.js"></script>
<script>
function render(){
  const box = document.getElementById("list");
  box.innerHTML = "";

  events.sort((a,b)=> new Date(a.date)-new Date(b.date));

  events.forEach(e=>{
    box.innerHTML += `
      <div class="card">
        <h3>${e.name}</h3>
        <div>📅 ${e.date}</div>

        <div class="links">
          ${e.meeting ? `<a class="meeting" href="${e.meeting}" target="_blank">Meeting</a>` : ""}
          ${e.attendance ? `<a class="attendance" href="${e.attendance}" target="_blank">Attendance</a>` : ""}
          ${e.media ? `<a class="media" href="${e.media}" target="_blank">Media</a>` : ""}
        </div>
      </div>
    `;
  });
}

render();
setInterval(render, 2000);
</script>

</body>
</html>
