<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<title>ALGHAD NURSERIES - EVENTS</title>

<style>
:root{
  --primary:#0f4c81;
  --meeting:#0078d4;
  --attendance:#28a745;
  --media:#6f42c1;
  --bg:#eef3f8;
}

body{
  margin:0;
  font-family:Segoe UI, Arial;
  background:var(--bg);
  direction:rtl;
  text-align:right;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.header{
  background:var(--primary);
  color:white;
  padding:25px;
  border-radius:12px;
  text-align:center;
}

.filter{
  margin-top:20px;
  background:#fff;
  padding:15px;
  border-radius:10px;
}

select{
  width:100%;
  padding:10px;
  margin-top:10px;
}

.event{
  background:#fff;
  margin-top:20px;
  padding:20px;
  border-radius:12px;
}

.links a{
  display:inline-block;
  margin:5px;
  padding:8px 12px;
  color:white;
  border-radius:6px;
  text-decoration:none;
}

.meeting{background:var(--meeting);}
.attendance{background:var(--attendance);}
.media{background:var(--media);}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>ALGHAD NURSERIES</h1>
  <h2>BANI YAS 1</h2>
</div>

<div class="filter">
  <label>📅 Filter by date:</label>
  <select id="dateFilter" onchange="renderEvents()">
    <option value="">All Dates</option>
  </select>
</div>

<div id="events"></div>

</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRbWMWEEgqyxzQipau5PqypYk5TQrIw2ghkLl_HGtrcZFPB9fPCzZ7UPSk1YrflTZHruRSWpwg92_zv/pub?output=csv";

let allEvents = [];

const el = id => document.getElementById(id);

/* FETCH CSV */
async function loadEvents(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    allEvents = parseCSV(text);

    loadDates();
    renderEvents();

  } catch(err){
    console.error("Load error:", err);
  }
}

/* SAFE CSV PARSER (handles Arabic + long links) */
function parseCSV(text){
  const lines = text.trim().split("\n");

  return lines.slice(1).map(line => {
    const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

    return {
      name: (cols[0] || "").replace(/"/g,"").trim(),
      date: (cols[1] || "").replace(/"/g,"").trim(),
      meeting: (cols[2] || "").replace(/"/g,"").trim(),
      attendance: (cols[3] || "").replace(/"/g,"").trim(),
      media: (cols[4] || "").replace(/"/g,"").trim()
    };
  });
}

/* FILTER DATES */
function loadDates(){
  const select = el("dateFilter");

  const dates = [...new Set(allEvents.map(e=>e.date))]
    .filter(Boolean)
    .sort();

  select.innerHTML = `<option value="">All Dates</option>`;

  dates.forEach(d=>{
    select.innerHTML += `<option value="${d}">${d}</option>`;
  });
}

/* RENDER EVENTS */
function renderEvents(){
  const container = el("events");
  container.innerHTML = "";

  let events = [...allEvents];

  const filter = el("dateFilter").value;
  if(filter){
    events = events.filter(e => e.date === filter);
  }

  events.forEach(e=>{
    container.innerHTML += `
      <div class="event">
        <h3>${e.name}</h3>
        <div>📅 ${e.date}</div>

        <div class="links">
          ${e.meeting ? `<a class="meeting" href="${e.meeting}" target="_blank">🎥 Meeting</a>` : ""}
          ${e.attendance ? `<a class="attendance" href="${e.attendance}" target="_blank">📝 Attendance</a>` : ""}
          ${e.media ? `<a class="media" href="${e.media}" target="_blank">📁 Media</a>` : ""}
        </div>
      </div>
    `;
  });
}

/* INIT */
loadEvents();
setInterval(loadEvents, 60000);
</script>

</body>
</html>
