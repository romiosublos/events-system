<script>
document.addEventListener("DOMContentLoaded", function () {

  let events = JSON.parse(localStorage.getItem("events") || "[]");

  function save(){
    localStorage.setItem("events", JSON.stringify(events));
  }

  function addEvent(){

    const nameEl = document.getElementById("name");
    const dateEl = document.getElementById("date");
    const meetingEl = document.getElementById("meeting");
    const attendanceEl = document.getElementById("attendance");
    const mediaEl = document.getElementById("media");

    const name = nameEl.value.trim();
    const date = dateEl.value;

    console.log("DEBUG NAME:", name);
    console.log("DEBUG DATE:", date);

    if(!name || !date){
      alert("Name + Date required");
      return;
    }

    events.push({
      id: Date.now(),
      name,
      date,
      meeting: meetingEl.value.trim(),
      attendance: attendanceEl.value.trim(),
      media: mediaEl.value.trim()
    });

    save();
    render();

    nameEl.value = "";
    dateEl.value = "";
    meetingEl.value = "";
    attendanceEl.value = "";
    mediaEl.value = "";
  }

  function deleteEvent(id){
    events = events.filter(e => e.id !== id);
    save();
    render();
  }

  function render(){
    const box = document.getElementById("list");
    box.innerHTML = "";

    events.sort((a,b)=> new Date(a.date)-new Date(b.date));

    events.forEach(e=>{
      box.innerHTML += `
        <div class="card">
          <h3>${e.name}</h3>
          <div>📅 ${e.date}</div>

          <button class="danger" onclick="window.deleteEvent(${e.id})">Delete</button>
        </div>
      `;
    });
  }

  // expose globally for onclick
  window.addEvent = addEvent;
  window.deleteEvent = deleteEvent;

  render();

});
</script>
